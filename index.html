<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponte Dourada - Login</title>
    <link rel="stylesheet" href="arquivocss.css">
</head>
<body>

<div id="tela-login">
    <div class="card-login">
        <div class="logo-login">
             <img src="1 - Copia.png" alt="logo">       
        </div>
      
        
        
        <div id="msg-error" class="msg-erro"></div>
        <div id="msg-success" class="msg-sucesso"></div>
        
        <form id="form-login">
            <div class="campo">
                <label>Login</label>
                <input type="text" id="login" placeholder="Digite seu login" required>
            </div>
            <div class="campo">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn-entrar">Entrar</button>
        </form>
    </div>
</div>

<script src="arquivojavascript.js"></script>
</body>
</html>
