<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponte Dourada - Agendamento</title>
    <link rel="stylesheet" href="arquivocss.css">
</head>
<body>

<div class="page-form">
    <div class="form-container">
        <div class="form-header">
            <button onclick="voltar()" class="btn-voltar">← Voltar</button>
            <h2>Agendamento - Cadastro</h2>
        </div>
        
        <form id="form-agendamento" class="form-cadastro">
            <div class="form-row">
                <div class="form-group">
                    <label>Cliente *</label>
                    <input type="text" id="agendamento-cliente" required>
                </div>
                <div class="form-group">
                    <label>Data *</label>
                    <input type="date" id="agendamento-data" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Horário</label>
                    <input type="time" id="agendamento-horario">
                </div>
                <div class="form-group">
                    <label>Serviço</label>
                    <select id="agendamento-servico">
                        <option>Consulta</option>
                        <option>Visita</option>
                        <option>Emergência</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn-salvar">Agendar</button>
        </form>
        
        <div id="mensagem-form" class="mensagem-area"></div>
    </div>
</div>

<script src="arquivojavascript.js"></script>
</body>
</html>
