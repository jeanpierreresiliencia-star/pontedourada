<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponte Dourada - Produtos</title>
    <link rel="stylesheet" href="arquivocss.css">
</head>
<body>

<div class="page-form">
    <div class="form-container">
        <div class="form-header">
            <button onclick="voltar()" class="btn-voltar">← Voltar</button>
            <h2>Produtos - Cadastro</h2>
        </div>
        
        <form id="form-produtos" class="form-cadastro">
            <div class="form-row">
                <div class="form-group">
                    <label>Nome do Produto *</label>
                    <input type="text" id="produto-nome" required>
                </div>
                <div class="form-group">
                    <label>Código</label>
                    <input type="text" id="produto-codigo">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="produto-categoria">
                        <option>Medicamentos</option>
                        <option>Equipamentos</option>
                        <option>Materiais</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Preço (R$)</label>
                    <input type="number" step="0.01" id="produto-preco">
                </div>
            </div>
            <button type="submit" class="btn-salvar">Salvar Produto</button>
        </form>
        
        <div id="mensagem-form" class="mensagem-area"></div>
    </div>
</div>

<script src="arquivojavascript.js"></script>
</body>
</html>
