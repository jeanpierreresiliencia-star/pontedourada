<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponte Dourada - Tela Principal</title>
    <link rel="stylesheet" href="arquivocss.css">
</head>
<body>

<div id="tela-principal">
    <header>
        <div class="logo-header">
                <img src="3 - Copia.png" alt="logo">
            <div class="logo-box">
                   <span>PD</span>
            </div>
            <h1></h1>
        </div>
        <div class="usuario-info">
            <span class="perfil-badge" id="cargo-usuario">CARGO</span>
            <span class="nome-usuario" id="nome-usuario">Usuário</span>
            <button onclick="sair()" class="btn-sair">Sair</button>
        </div>
    </header>
    
    <div class="menu-principal">
        <h2>Módulos do Sistema</h2>
        
        <div class="grid-menus" id="grid-menus">
            <!-- Os menus serão gerados via JavaScript -->
        </div>
    </div>
</div>

<script src="arquivojavascript.js"></script>
</body>
</html>
