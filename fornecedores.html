<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponte Dourada - Fornecedores</title>
    <link rel="stylesheet" href="arquivocss.css">
</head>
<body>

<div class="page-form">
    <div class="form-container">
        <div class="form-header">
            <button onclick="voltar()" class="btn-voltar">← Voltar</button>
            <h2>Fornecedores - Cadastro</h2>
        </div>
        
        <form id="form-fornecedores" class="form-cadastro">
            <div class="form-row">
                <div class="form-group">
                    <label>Fornecedor *</label>
                    <input type="text" id="fornecedor-nome" required>
                </div>
                <div class="form-group">
                    <label>CNPJ</label>
                    <input type="text" id="fornecedor-cnpj">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="tel" id="fornecedor-telefone">
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="fornecedor-email">
                </div>
            </div>
            <button type="submit" class="btn-salvar">Salvar Fornecedor</button>
        </form>
        
        <div id="mensagem-form" class="mensagem-area"></div>
    </div>
</div>

<script src="arquivojavascript.js"></script>
</body>
</html>
